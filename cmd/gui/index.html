<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Job Search — Profile</title>
<style>
  /* Platform design tokens — kept in sync with project-platform's @platform/ui
     (tokens.css). Inlined rather than imported because this page is a single
     self-contained file embedded into the Go binary. */
  :root {
    --bg: #e5edff; --wash-1: 30%; --wash-2: 28.2%; --wash-3: 15.9%;
    --panel: #ffffff; --panel-2: #eef1f9;
    --ink: #161922; --muted: #4e5768; --line: #ccd2e2;
    --accent: #1e3a8a; --accent2: #1fb6d0; --accent-ink: #fff; --chip: #eef1f9;
    --shadow: 0 1px 2px rgba(22,30,60,.05), 0 6px 18px rgba(22,30,60,.07);
    --shadow-lg: 0 4px 14px rgba(22,30,60,.07), 0 14px 40px rgba(22,30,60,.10);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0c0e15; --wash-1: 19.6%; --wash-2: 18.4%; --wash-3: 10.4%;
      --panel: #161a24; --panel-2: #1e2330;
      --ink: #edf0f7; --muted: #98a2b6; --line: #28303f;
      --accent: #6d8ad6; --accent2: #3ad4e6; --chip: #1e2330;
      --shadow: 0 1px 2px rgba(0,0,0,.3), 0 8px 22px rgba(0,0,0,.2);
      --shadow-lg: 0 5px 18px rgba(0,0,0,.24), 0 18px 46px rgba(0,0,0,.26);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; color: var(--ink); line-height: 1.5; min-height: 100vh; -webkit-font-smoothing: antialiased;
    font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    /* Three accent washes bleeding off the page corners — the platform signature. */
    background:
      radial-gradient(1100px 560px at 12% -8%, color-mix(in srgb, var(--accent) var(--wash-1), transparent), transparent 50%),
      radial-gradient(900px 520px at 104% 4%, color-mix(in srgb, var(--accent) var(--wash-2), transparent), transparent 50%),
      radial-gradient(760px 700px at 50% 120%, color-mix(in srgb, var(--accent) var(--wash-3), transparent), transparent 50%),
      var(--bg);
    background-attachment: fixed;
  }
  /* Corner profile switch — a fake identity toggle (NOT auth) that picks the run
     mode: Guest = $0 mock, Admin = the real pipeline. */
  .idswitch {
    position: fixed; top: 10px; right: 14px; z-index: 40;
    display: flex; align-items: center; gap: 9px; font-size: 12px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 999px;
    box-shadow: var(--shadow); padding: 4px 11px 4px 13px;
  }
  .idlabel { color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .4px; font-size: 10px; }
  .idseg { display: inline-flex; background: var(--panel-2); border-radius: 999px; padding: 2px; }
  .idbtn { border: 0; background: transparent; color: var(--muted); font: inherit; font-size: 12px; font-weight: 700; padding: 4px 13px; border-radius: 999px; cursor: pointer; }
  .idbtn.active { background: var(--accent); color: var(--accent-ink); }
  .idbtn:disabled { opacity: .4; cursor: not-allowed; }
  .idmode { font-weight: 800; font-size: 11px; color: var(--muted); min-width: 68px; }
  .idmode.spend { color: #d0433b; }

  /* Two columns: the filters banner (fold built in) and the table. */
  .layout { display: grid; grid-template-columns: auto 1fr; gap: 12px; padding: 12px 18px 24px; align-items: start; }
  @media (max-width: 820px) { .layout { grid-template-columns: 1fr; } .foldbar { display: none; } }

  /* The filters banner — ONE element in the home-page bio-masthead style, with the fold rail built
     into it (like the masthead and its pull-down are one element). */
  .banner {
    display: flex; align-items: stretch; overflow: hidden;
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow-lg);
    position: sticky; top: 12px; max-height: calc(100vh - 24px);
  }
  .filters-body { width: 262px; padding: 13px; overflow-y: auto; }
  .layout.collapsed .filters-body { display: none; } /* folded: the banner shrinks to the rail, table widens */
  .side-head { margin: 0 0 9px; }
  .side-head h1 {
    font-size: 16px; margin: 0 0 2px; font-weight: 820; letter-spacing: -.4px;
    background: linear-gradient(96deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .side-head .sub { display: block; color: var(--muted); font-size: 11.5px; font-weight: 500; line-height: 1.35; }
  label.row small { color: var(--muted); font-weight: 500; font-size: 10.5px; }
  main { min-width: 0; }

  /* The fold rail — the home page's .arch-pull turned vertical, and a CHILD of the banner so the fold
     is part of the same element. */
  .foldbar {
    flex: none; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px;
    border: 0; border-left: 1px solid var(--line); padding: 0 4px;
    background: linear-gradient(90deg, transparent, color-mix(in srgb, var(--accent) 8%, transparent));
    color: var(--accent); font: inherit; font-weight: 700; font-size: 12px; letter-spacing: .6px;
    cursor: pointer; transition: background .16s ease;
  }
  .foldbar:hover { background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .foldbar:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
  .fold-label { writing-mode: vertical-rl; text-transform: uppercase; }
  .fold-chev { font-size: 16px; line-height: 1; transition: transform .3s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .layout.collapsed .fold-chev { transform: rotate(180deg); }
  fieldset { border: 1px solid var(--line); border-radius: 11px; padding: 7px 11px 8px; margin: 0 0 6px; background: var(--panel); }
  legend { font-weight: 700; font-size: 10.5px; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); padding: 0 5px; }
  label.row { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin: 3px 0; }
  label.row span { font-size: 12.5px; }
  input[type=number], input[type=text] {
    background: var(--panel); color: var(--ink); border: 1px solid var(--line);
    border-radius: 7px; padding: 4px 8px; font: inherit; width: 92px; text-align: right;
  }
  input[type=text] { width: 100%; text-align: left; }
  input:focus-visible { outline: 2px solid color-mix(in srgb, var(--accent) 45%, transparent); outline-offset: 1px; border-color: var(--accent); }
  input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--accent); }
  .field-full { display: block; margin: 5px 0; }
  .field-full span { display: block; color: var(--muted); font-size: 11.5px; margin-bottom: 3px; }
  /* Recency: three tight fields on one row, to save the vertical space of three stacked rows. */
  .inline-fields { display: flex; gap: 7px; }
  .inline-fields label { flex: 1; display: flex; flex-direction: column; gap: 2px; font-size: 11px; color: var(--muted); }
  .inline-fields input { width: 100%; text-align: right; }
  .actions { display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 10px; }
  button {
    font: inherit; font-size: 13px; font-weight: 700; border-radius: 11px; padding: 8px 14px; cursor: pointer;
    color: var(--ink); border: 1px solid color-mix(in srgb, var(--accent) 22%, var(--line));
    background: color-mix(in srgb, var(--accent) 8%, var(--panel-2));
    transition: transform .13s cubic-bezier(0.2,0.8,0.2,1), box-shadow .13s, border-color .13s, color .13s;
  }
  button:hover { transform: translateY(-1px); border-color: var(--accent); color: var(--accent); }
  button.primary {
    color: #fff; border-color: transparent;
    background: linear-gradient(180deg, var(--accent), color-mix(in srgb, var(--accent) 78%, #000));
    box-shadow: 0 2px 8px color-mix(in srgb, var(--accent) 20%, transparent);
  }
  button.primary:hover { color: #fff; }
  .status { min-height: 20px; color: var(--muted); font-size: 13px; margin-bottom: 12px; }
  .status.err { color: #d0433b; }
  .count { font-weight: 800; color: var(--ink); }

  /* The results table is a panel card, matching the aside. */
  .tablewrap {
    overflow-x: auto; border: 1px solid var(--line); border-radius: 16px;
    background: var(--panel); box-shadow: var(--shadow);
    scrollbar-width: thin; scrollbar-color: var(--muted) var(--line);
  }
  .tablewrap::-webkit-scrollbar { height: 11px; }
  .tablewrap::-webkit-scrollbar-thumb { background: var(--muted); border-radius: 6px; }
  .tablewrap::-webkit-scrollbar-track { background: var(--line); border-radius: 6px; }

  /* width:auto = size to content, so columns don't stretch and the row overflows into a scroll. */
  table { border-collapse: collapse; width: auto; font-size: 12px; }
  th, td { border-bottom: 1px solid var(--line); padding: 4px 10px; text-align: left; white-space: nowrap; vertical-align: middle; }
  th { position: sticky; top: 0; background: var(--accent); color: var(--accent-ink); font-weight: 700; cursor: pointer; z-index: 2; }
  tbody tr:hover { background: color-mix(in srgb, var(--accent) 4%, transparent); }
  /* per-column legend row: sits above the header on the panel; not sticky, so the header pins over it */
  tr.legrow th { position: static; background: var(--panel); color: var(--muted); border-bottom: none; padding: 6px 10px 3px; cursor: default; font-weight: 700; }
  .chip { display: inline-flex; align-items: center; gap: 4px; margin-right: 9px; font-size: 10.5px; white-space: nowrap; letter-spacing: .2px; }
  .sw { display: inline-block; width: 11px; height: 11px; border-radius: 3px; border: 1px solid rgba(0,0,0,.18); flex: none; }

  td a { color: inherit; text-decoration: underline; text-underline-offset: 2px; }
  td a:hover { color: var(--accent); }
  td.title { max-width: 240px; overflow: hidden; text-overflow: ellipsis; font-weight: 600; }
  td.remote { text-align: center; font-weight: 700; }
  td.remote.yes { color: #2f9e44; }
  td.remote.no { color: color-mix(in srgb, var(--muted) 55%, transparent); }
  /* Numeric columns right-align header AND value, so a short number sits under a short (relabelled)
     header with no wide empty gap between them. */
  th.num { text-align: right; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  th.num, td.num { padding-left: 6px; }
  td.reason { max-width: 300px; overflow: hidden; text-overflow: ellipsis; color: var(--muted); }
  /* Location trims like title/reason; the hover tooltip reveals the full value. */
  td.location { max-width: 150px; overflow: hidden; text-overflow: ellipsis; }
  .empty { padding: 34px; text-align: center; color: var(--muted); }

  .pager { display: flex; align-items: center; gap: 12px; margin: 12px 2px 0; font-size: 12.5px; color: var(--muted); }
  .pager button { padding: 5px 12px; font-size: 12.5px; }
  .pager button:disabled { opacity: .45; cursor: default; transform: none; }
  .pager .tab { font-variant-numeric: tabular-nums; }

  /* Run button + the Jobs progress panel. */
  .run { width: 100%; margin-top: 2px; justify-content: center; font-size: 13.5px; }
  .run:disabled { opacity: .7; cursor: default; transform: none; }
  .runview { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; box-shadow: var(--shadow); padding: 16px 18px; margin-bottom: 12px; }
  .run-head { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-bottom: 15px; }
  .run-head h2 { margin: 0; font-size: 15px; font-weight: 800; color: var(--ink); }
  .run-note { font-size: 11.5px; color: var(--muted); font-weight: 600; }
  .bars { display: flex; flex-direction: column; gap: 11px; }
  .barrow { display: grid; grid-template-columns: 92px 1fr 104px; align-items: center; gap: 12px; font-size: 12.5px; }
  .barlabel { color: var(--muted); font-weight: 700; }
  .bar { height: 12px; border-radius: 999px; background: var(--panel-2); border: 1px solid var(--line); overflow: hidden; }
  .bar-fill { display: block; height: 100%; width: 0; border-radius: 999px; background: linear-gradient(90deg, var(--accent), var(--accent2)); transition: width .35s cubic-bezier(0.2, 0.8, 0.2, 1); }
  .bar-fill.rate { background: linear-gradient(90deg, #FFC000, #d0433b); }
  .barnum { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink); font-weight: 700; }

  /* Delayed full-text tooltip for any clipped cell. Inverted ink panel — reads in both themes. */
  .tip {
    position: fixed; z-index: 50; display: none; max-width: 440px;
    background: var(--ink); color: var(--panel); padding: 6px 10px; border-radius: 8px;
    font-size: 12px; line-height: 1.4; box-shadow: var(--shadow-lg);
    white-space: normal; word-break: break-word; pointer-events: none;
  }
</style>
</head>
<body>
<div class="idswitch" title="Not real auth — a mode switch. Guest runs the $0 mock; Admin runs the real Apify + Claude pipeline.">
  <span class="idlabel">Profile</span>
  <div class="idseg">
    <button class="idbtn active" data-role="guest">Guest</button>
    <button class="idbtn" data-role="admin" id="admin-btn">Admin</button>
  </div>
  <span class="idmode" id="idmode">mock · $0</span>
</div>

<div class="layout" id="layout">
  <aside class="banner">
    <div class="filters-body">
      <div class="side-head">
        <h1>Job Search — Profile</h1>
        <span class="sub">Tune your search, then run a suite of jobs.</span>
      </div>

      <fieldset>
        <legend>Filters</legend>
        <label class="field-full"><span>Search keywords</span>
          <input type="text" id="keywords" placeholder="Software Engineer"></label>
        <label class="row"><span>Job count <small>(max 10k)</small></span><input type="number" id="job_count" min="1" max="10000" value="10"></label>
        <label class="field-full"><span>Locations (comma-separated)</span>
          <input type="text" id="locations" placeholder="Boston, New York, Los Angeles"></label>
        <label class="row"><span>Allow remote anywhere</span><input type="checkbox" id="remote_ok"></label>
        <label class="row"><span>Max age (days)</span><input type="number" id="max_age_days" min="0"></label>
        <label class="row"><span>Min salary ($)</span><input type="number" id="min_salary" min="0" step="1000"></label>
        <label class="row"><span>Min score (0–1)</span><input type="number" id="min_score" min="0" max="1" step="0.05"></label>
        <label class="row"><span>Include likely-ghosts</span><input type="checkbox" id="include_ghosts"></label>
        <label class="row"><span>Estimate missing pay</span><input type="checkbox" id="estimate_salary"></label>
      </fieldset>

      <fieldset>
        <legend>Highlight thresholds</legend>
        <label class="row"><span>Salary light ($)</span><input type="number" id="salary_light" min="0" step="1000"></label>
        <label class="row"><span>Salary strong ($)</span><input type="number" id="salary_strong" min="0" step="1000"></label>
        <label class="row"><span>Startup max headcount</span><input type="number" id="startup_max" min="0"></label>
      </fieldset>

      <fieldset>
        <legend>Recency (days)</legend>
        <div class="inline-fields">
          <label>Fresh ≤<input type="number" id="fresh" min="0"></label>
          <label>Recent ≤<input type="number" id="recent" min="0"></label>
          <label>Aging ≤<input type="number" id="aging" min="0"></label>
        </div>
      </fieldset>

      <button class="primary run" id="run">▶&nbsp;&nbsp;Run search</button>
    </div>

    <button class="foldbar" id="toggle" aria-label="Show or hide filters" aria-expanded="true" title="Show/hide filters">
      <span class="fold-label">Filters</span>
      <span class="fold-chev">‹</span>
    </button>
  </aside>

  <main>
    <div class="status" id="status">Loading profile…</div>
    <section class="runview" id="runview" hidden>
      <div class="run-head"><h2 id="run-title">Running search…</h2><span class="run-note" id="run-note">mock · $0</span></div>
      <div class="bars">
        <div class="barrow"><span class="barlabel">Apify load</span><div class="bar"><i class="bar-fill" id="bar-apify"></i></div><span class="barnum" id="num-apify">0 / 10</span></div>
        <div class="barrow"><span class="barlabel">Post-process</span><div class="bar"><i class="bar-fill" id="bar-verify"></i></div><span class="barnum" id="num-verify">0 / 10</span></div>
        <div class="barrow"><span class="barlabel">Rate limit</span><div class="bar"><i class="bar-fill rate" id="bar-rate"></i></div><span class="barnum" id="num-rate">$0.00 / $5.00</span></div>
      </div>
    </section>
    <div class="tablewrap"><div class="empty" id="table">Set your filters, then press <b>Run</b> to fetch a suite of jobs.</div></div>
    <div class="pager" id="pager"></div>
  </main>
</div>

<script>
const $ = id => document.getElementById(id);
let sortState = { col: -1, dir: 1 };
let last = null;
let page = 0;
const PAGE_SIZE = 40;
let role = 'guest';                                  // corner profile switch: guest | admin
let runCfg = { realReady: false, spends: false };    // from /api/config

function populate(p) {
  $('locations').value = (p.filters.locations || []).join(', ');
  $('remote_ok').checked = p.filters.remote_ok;
  $('max_age_days').value = p.filters.max_age_days;
  $('min_salary').value = p.filters.min_salary;
  $('min_score').value = p.filters.min_score;
  $('include_ghosts').checked = p.filters.include_ghosts;
  $('salary_light').value = p.highlight.salary_light;
  $('salary_strong').value = p.highlight.salary_strong;
  $('startup_max').value = p.highlight.startup_max;
  $('fresh').value = p.highlight.recency_fresh_days;
  $('recent').value = p.highlight.recency_recent_days;
  $('aging').value = p.highlight.recency_aging_days;
  $('estimate_salary').checked = p.estimate_salary;
}

function collect() {
  const n = id => Number($(id).value);
  const c = id => $(id).checked;
  return {
    filters: {
      locations: $('locations').value.split(',').map(s => s.trim()).filter(Boolean),
      remote_ok: c('remote_ok'), max_age_days: n('max_age_days'),
      min_salary: n('min_salary'), min_score: n('min_score'), include_ghosts: c('include_ghosts'),
    },
    highlight: {
      salary_light: n('salary_light'), salary_strong: n('salary_strong'), startup_max: n('startup_max'),
      recency_fresh_days: n('fresh'), recency_recent_days: n('recent'), recency_aging_days: n('aging'),
    },
    estimate_salary: c('estimate_salary'),
    job_count: n('job_count'),
    keywords: $('keywords').value.trim(),
    role: role,
  };
}

function setStatus(msg, err) { const s = $('status'); s.textContent = msg; s.className = 'status' + (err ? ' err' : ''); }

function esc(s) { return (s == null ? '' : String(s)).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/"/g, '&quot;'); }
function isNumericCol(name) {
  return ['company_size', 'years_experience', 'salary_min', 'salary_max', 'salary_est_min', 'salary_est_max', 'score', 'applicants'].includes(name);
}
// Short header labels for the widest columns — trims the empty space between a long header and its
// short value. Only the displayed <th> text changes; the real column names still drive the logic.
const SHORT = {
  company_size: 'size', years_experience: 'yrs', apply_type: 'apply',
  salary_min: 'pay min', salary_max: 'pay max', salary_est_min: 'est min', salary_est_max: 'est max',
};
const label = c => SHORT[c] || c;
function fmt(name, v) {
  if (v === '' || v == null) return '';
  if (name.startsWith('salary')) { const n = Number(v); return isNaN(n) ? esc(v) : '$' + n.toLocaleString(); }
  return esc(v);
}

// Column-specific colour legends, sitting above the column they explain. Labels
// reflect the current threshold inputs.
function chip(hex, label) { return `<span class="chip"><span class="sw" style="background:#${hex}"></span>${label}</span>`; }
function legendChips(col) {
  const n = id => Number($(id).value);
  const k = v => '$' + Math.round(v / 1000) + 'k';
  if (col === 'company') return chip('FFE699', 'F500') + chip('9BC2E6', 'Software') + chip('D9C2E9', 'Startup');
  if (col === 'salary_min') return chip('E2EFDA', '≥' + k(n('salary_light'))) + chip('A9D08E', '≥' + k(n('salary_strong')));
  if (col === 'posted') return chip('92D050', '≤' + n('fresh') + 'd') + chip('FFEB9C', '≤' + n('recent') + 'd') + chip('FFC000', '≤' + n('aging') + 'd') + chip('FF9999', '>' + n('aging') + 'd');
  return '';
}

function render() {
  if (!last) return;
  const { columns, rows } = last;
  if (!rows.length) {
    $('table').outerHTML = '<div class="empty" id="table">No listings match this profile.</div>';
    $('pager').innerHTML = '';
    return;
  }

  // Paginate: 40 to a page. Clamp so a shrunk result set (after a sort/re-filter) can't strand us on
  // a page that no longer exists.
  const pages = Math.ceil(rows.length / PAGE_SIZE);
  page = Math.max(0, Math.min(page, pages - 1));
  const start = page * PAGE_SIZE;
  const pageRows = rows.slice(start, start + PAGE_SIZE);

  // No native title= attributes: the delayed tooltip (below) covers every clipped cell, and two
  // tooltip systems on one cell fight.
  const idxTitle = columns.indexOf('title');
  const body = pageRows.map(r => {
    const tds = r.cells.map((cell, i) => {
      const name = columns[i];
      const bg = cell.fill ? ` style="background:#${cell.fill}"` : '';
      let val = fmt(name, cell.value), cls = '';
      if (i === idxTitle) {
        cls = 'title';
        if (r.url) val = `<a href="${esc(r.url)}" target="_blank" rel="noopener">${val}</a>`;
      } else if (name === 'remote') {
        const yes = cell.value === 'true';
        val = yes ? '✓' : (cell.value === 'false' ? '✗' : '');
        cls = 'remote ' + (yes ? 'yes' : 'no');
      } else if (name === 'location') {
        cls = 'location';
      } else if (name === 'reasoning') {
        cls = 'reason';
      } else if (isNumericCol(name)) {
        cls = 'num';
      }
      return `<td class="${cls}"${bg}>${val}</td>`;
    }).join('');
    return `<tr>${tds}</tr>`;
  }).join('');

  const legrow = columns.map(c => `<th class="legcell">${legendChips(c)}</th>`).join('');
  const head = columns.map((c, i) => `<th data-col="${i}" class="${isNumericCol(c) ? 'num' : ''}">${label(c)}</th>`).join('');
  $('table').outerHTML = `<table id="table"><thead><tr class="legrow">${legrow}</tr><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
  document.querySelectorAll('#table thead tr:last-child th').forEach(th =>
    th.addEventListener('click', () => sortBy(Number(th.dataset.col))));

  renderPager(rows.length, pages, start);
}

function renderPager(total, pages, start) {
  const end = Math.min(start + PAGE_SIZE, total);
  if (pages <= 1) { $('pager').innerHTML = `<span>${total} listing${total === 1 ? '' : 's'}</span>`; return; }
  $('pager').innerHTML =
    `<button ${page === 0 ? 'disabled' : ''} data-d="-1">‹ Prev</button>` +
    `<span class="tab">${start + 1}–${end} of ${total}  ·  page ${page + 1} of ${pages}</span>` +
    `<button ${page >= pages - 1 ? 'disabled' : ''} data-d="1">Next ›</button>`;
  $('pager').querySelectorAll('button[data-d]').forEach(b =>
    b.addEventListener('click', () => { page += Number(b.dataset.d); render(); document.querySelector('.tablewrap').scrollTop = 0; }));
}

function sortBy(col) {
  sortState.dir = sortState.col === col ? -sortState.dir : 1;
  sortState.col = col;
  page = 0; // a re-sort re-orders the whole set — start from the top of it
  const num = isNumericCol(last.columns[col]);
  last.rows.sort((a, b) => {
    let x = a.cells[col].value, y = b.cells[col].value;
    if (num) { return ((Number(x) || 0) - (Number(y) || 0)) * sortState.dir; }
    return x.localeCompare(y) * sortState.dir;
  });
  render();
}

async function preview() {
  setStatus('Filtering cached results…');
  try {
    const res = await fetch('/api/preview', { method: 'POST', body: JSON.stringify(collect()) });
    if (!res.ok) throw new Error(await res.text());
    last = await res.json();
    sortState = { col: -1, dir: 1 };
    page = 0;
    render();
    $('status').innerHTML = `<span class="count">${last.kept}</span> of ${last.total} verified listings match.`;
    $('status').className = 'status';
  } catch (e) { setStatus(e.message, true); }
}

// --- Run: fetch a fresh suite of jobs and watch its progress -----------------------------------
let pollTimer = 0;
function setBar(name, done, total) {
  $('bar-' + name).style.width = (total ? Math.round(done / total * 100) : 0) + '%';
  $('num-' + name).textContent = done + ' / ' + total;
}
function showRunview(on) {
  $('runview').hidden = !on;
  document.querySelector('.tablewrap').style.display = on ? 'none' : '';
}
function resetRun() { const b = $('run'); b.disabled = false; b.innerHTML = '▶&nbsp;&nbsp;Run search'; }

async function run() {
  clearTimeout(pollTimer);
  const b = $('run'); b.disabled = true; b.textContent = 'Running…';
  $('pager').innerHTML = '';
  setBar('apify', 0, 10); setBar('verify', 0, 10);
  $('run-title').textContent = 'Starting…';
  showRunview(true);
  try {
    const res = await fetch('/api/run', { method: 'POST', body: JSON.stringify(collect()) });
    if (!res.ok) throw new Error(await res.text());
    poll((await res.json()).id);
  } catch (e) { setStatus(e.message, true); showRunview(false); resetRun(); }
}

async function poll(id) {
  try {
    const res = await fetch('/api/run?id=' + encodeURIComponent(id));
    if (!res.ok) throw new Error(await res.text());
    const j = await res.json();
    setBar('apify', j.apify.done, j.apify.total);
    setBar('verify', j.verify.done, j.verify.total);
    $('bar-rate').style.width = Math.min(100, j.rate.used / j.rate.limit * 100) + '%';
    $('num-rate').textContent = '$' + j.rate.used.toFixed(2) + ' / $' + j.rate.limit.toFixed(2);
    $('run-title').textContent =
      j.phase === 'apify' ? 'Scraping via Apify…' : j.phase === 'verify' ? 'Verifying (ATS + Claude)…' : 'Done';
    $('run-note').textContent = j.spends ? 'LIVE · spends Apify + Claude' : 'mock · $0 (no Apify / Claude)';
    if (j.status === 'done') {
      last = { columns: j.columns, rows: j.rows, kept: j.rows.length, total: j.rows.length };
      sortState = { col: -1, dir: 1 }; page = 0;
      showRunview(false);
      render();
      $('status').innerHTML = `Run complete — <span class="count">${j.rows.length}</span> jobs loaded.`;
      $('status').className = 'status';
      resetRun();
      return;
    }
    if (j.status === 'error') { setStatus(j.error || 'run failed', true); showRunview(false); resetRun(); return; }
    pollTimer = setTimeout(() => poll(id), 350);
  } catch (e) { setStatus(e.message, true); resetRun(); }
}

$('run').addEventListener('click', run);

// Corner profile switch — Guest runs the $0 mock, Admin runs the real pipeline.
function applyMode() {
  const admin = role === 'admin';
  const spends = admin && runCfg.spends;
  const el = $('idmode');
  el.textContent = !admin ? 'mock · $0' : (spends ? 'LIVE · spends' : 'real · $0');
  el.className = 'idmode' + (spends ? ' spend' : '');
  document.querySelectorAll('.idbtn').forEach(b => b.classList.toggle('active', b.dataset.role === role));
}
document.querySelectorAll('.idbtn').forEach(b => b.addEventListener('click', () => {
  if (b.disabled) return;
  role = b.dataset.role;
  applyMode();
}));
fetch('/api/config').then(r => r.json()).then(c => {
  runCfg = c;
  if (!c.realReady) {
    const a = $('admin-btn');
    a.disabled = true;
    a.title = 'Real runs unavailable — start the server with APIFY_TOKEN set';
  }
  applyMode();
}).catch(() => {});

// Fold the sidebar to give the listings the full width. The toggle lives in main, so it is still
// there to un-fold with.
$('toggle').addEventListener('click', () => {
  const collapsed = $('layout').classList.toggle('collapsed');
  $('toggle').setAttribute('aria-expanded', String(!collapsed));
});

// Hover a CLIPPED cell for one second to read its full value. Delegated on .tablewrap, which persists
// across table re-renders (render() replaces only #table, its child). The dwell timer restarts ONLY
// when the pointer crosses into a DIFFERENT cell — a true one-second hover, not something a micro-
// movement inside the same cell keeps resetting. Non-clipped cells reveal nothing, so they get none.
(function tooltips() {
  const tip = document.createElement('div');
  tip.className = 'tip';
  document.body.appendChild(tip);
  const wrap = document.querySelector('.tablewrap');
  let timer = 0, cur = null;
  const hide = () => { clearTimeout(timer); tip.style.display = 'none'; };
  wrap.addEventListener('mouseover', e => {
    const td = e.target.closest('td');
    if (td === cur) return;
    cur = td;
    hide();
    if (!td || td.scrollWidth <= td.clientWidth + 1) return;
    const text = td.textContent.trim();
    if (!text) return;
    timer = setTimeout(() => {
      tip.textContent = text;
      tip.style.display = 'block';
      const r = td.getBoundingClientRect();
      const x = Math.max(8, Math.min(r.left, window.innerWidth - tip.offsetWidth - 8));
      const below = r.bottom + 6;
      const y = below + tip.offsetHeight > window.innerHeight ? r.top - tip.offsetHeight - 6 : below;
      tip.style.left = x + 'px';
      tip.style.top = Math.max(8, y) + 'px';
    }, 1000);
  });
  wrap.addEventListener('mouseleave', () => { cur = null; hide(); });
})();

fetch('/api/profile').then(r => r.json()).then(p => {
  populate(p);
  preview();
}).catch(e => setStatus('Could not load profile: ' + e.message, true));
</script>
